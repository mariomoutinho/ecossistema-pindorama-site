name: Deploy to Hostinger

on:
  push:
    branches: [main]

jobs:
  deploy:
    name: FTP deploy → public_html
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do repositório
        uses: actions/checkout@v4

      - name: Publicar via FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.5
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ../
          local-dir: ./
          # log-level: verbose   # descomente para diagnosticar
          exclude: |
            **/.git*
            **/.git*/**
            .github/**
            node_modules/**
            **/node_modules/**
            .vscode/**
            **/.vscode/**
            .claude/**
            **/.claude/**
            README.md
            CLAUDE.md
            **/.DS_Store
            **/Thumbs.db
            **/*Zone.Identifier*
            **/*.log
            **/*.bak
            # --- arquivos sensíveis que devem permanecer só no servidor ---
            config-db.php
            pindoramarpg/config.php
            # --- artefatos que não pertencem ao deploy ---
            dbtest.php
            _backup_*/**
            _hostinger_*/**
            *.zip
            **/*.sql

      # Remove uma publicação antiga feita dentro de public_html/public_html.
      # Esta conta FTP está abrindo dentro da pasta duplicada; o deploy acima
      # publica um nível acima, na raiz pública real do domínio.
      - name: Remover public_html duplicado
        if: always()
        env:
          FTP_HOST:     ${{ secrets.FTP_SERVER }}
          FTP_USER:     ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          set +e
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp >/dev/null
          lftp -u "$FTP_USER","$FTP_PASSWORD" "ftp://$FTP_HOST" <<'EOF'
            set ftp:ssl-allow no
            set ftp:passive-mode true
            set net:timeout 30
            set cmd:fail-exit no
            echo "--- raiz FTP detectada ---"
            pwd
            echo "--- subindo para a raiz publica real ---"
            cd ..
            pwd
            echo "--- removendo duplicacao se existir: public_html ---"
            cls -la public_html
            rm -r public_html
            echo "--- apos limpeza ---"
            cls -la public_html
            bye
          EOF
          exit 0

      # Auditoria pós-deploy (não-bloqueante): conecta no FTP e lista
      # permissões/tamanho dos arquivos críticos servidos por Apache.
      # Útil para diagnosticar 403 (chmod errado em index.php ou
      # .htaccess silencioso colocado manualmente).
      - name: Auditar permissões no servidor
        if: always()
        env:
          FTP_HOST:     ${{ secrets.FTP_SERVER }}
          FTP_USER:     ${{ secrets.FTP_USERNAME }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
        run: |
          set +e
          sudo apt-get update -qq && sudo apt-get install -y -qq lftp >/dev/null
          # FTP plain (porta 21). Hostinger não aceita FTPS em contas
          # adicionais. set ftp:ssl-allow no desliga AUTH TLS.
          lftp -u "$FTP_USER","$FTP_PASSWORD" "ftp://$FTP_HOST" <<'EOF'
            set ftp:ssl-allow no
            set ftp:passive-mode true
            set net:timeout 30
            set cmd:fail-exit no
            echo "--- pwd (raiz da conta FTP) ---"
            pwd
            echo "--- ls -la raiz (mostra .htaccess se houver) ---"
            cls -la
            echo "--- arquivos críticos na raiz ---"
            cls -la index.php coletivopindorama.php .htaccess
            echo "--- pindoramarpg/ ---"
            cls -la pindoramarpg/index.php pindoramarpg/.htaccess
            echo "--- pasta lixo public_html/ dentro da raiz? ---"
            cls -la public_html
            bye
          EOF
          exit 0
